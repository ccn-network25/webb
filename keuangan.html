<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Control | #am</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { display: none; } 
        .navbar-custom { background-color: #1a1d20 !important; }
        .card-finance { border: 1px solid #2b2f32; border-radius: 12px; }
    </style>
</head>
<body class="bg-dark text-light">

    <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary mb-4 navbar-custom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="beranda.html">IVAN <span class="text-primary">#am</span></a>
            <div class="d-flex align-items-center gap-3">
                <span id="sessionTimer" class="small text-warning fw-bold">Sesi: 15:00</span>
                <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Exit</button>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row mb-4">
            <div class="col-md-8">
                <h2 class="fw-bold mb-0">Financial Dashboard</h2>
                <p class="text-secondary small">Monitoring Saldo & Kontrol Anggaran Bulanan</p>
            </div>
            <div class="col-md-4 text-md-end">
                <button class="btn btn-sm btn-outline-secondary" onclick="window.toggleMask()">👁️ Sensor</button>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card bg-dark card-finance p-3 border-start border-primary border-4 h-100">
                    <h6 class="text-secondary small text-uppercase">Total Saldo</h6>
                    <h2 id="totalSaldo" class="fw-bold text-primary">Rp 0</h2>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card bg-dark card-finance p-3 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="text-secondary small m-0">LIMIT PENGELUARAN</h6>
                        <input type="number" id="inputLimit" class="form-control form-control-sm bg-transparent text-light border-secondary w-25" onchange="window.setLimit()">
                    </div>
                    <div class="progress" style="height: 12px;">
                        <div id="budgetBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
                    </div>
                    <div class="d-flex justify-content-between mt-2">
                        <span id="labelPersen" class="small fw-bold">0%</span>
                        <span id="labelSisa" class="small text-secondary">Sisa: Rp 0</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card bg-dark card-finance p-4">
                    <h5 class="fw-bold mb-3 border-bottom border-secondary pb-2">Input Data</h5>
                    <form id="formTransaksi">
                        <div class="mb-3">
                            <label class="small text-secondary">Tipe</label>
                            <select id="tipe" class="form-select bg-dark text-light border-secondary">
                                <option value="masuk">Pemasukan (+)</option>
                                <option value="keluar">Pengeluaran (-)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="small text-secondary">Keterangan</label>
                            <input type="text" id="keterangan" class="form-control bg-dark text-light border-secondary" required>
                        </div>
                        <div class="mb-3">
                            <label class="small text-secondary">Nominal</label>
                            <input type="number" id="nominal" class="form-control bg-dark text-light border-secondary" required>
                        </div>
                        <div class="mb-3">
                            <label class="small text-secondary">Tanggal Transaksi</label>
                            <input type="date" id="tanggal" class="form-control bg-dark text-light border-secondary" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Simpan</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card bg-dark card-finance">
                    <div class="card-header bg-dark border-secondary p-3">
                        <div class="row g-2 align-items-center">
                            <div class="col-md-4">
                                <h5 class="m-0 fw-bold">Ledger</h5>
                            </div>
                            <div class="col-md-8 d-flex gap-2">
                                <select id="filterBulan" class="form-select form-select-sm bg-dark text-light border-secondary" onchange="window.ambilDataTransaksi()">
                                    <option value="01">Januari</option><option value="02">Februari</option><option value="03">Maret</option>
                                    <option value="04">April</option><option value="05">Mei</option><option value="06">Juni</option>
                                    <option value="07">Juli</option><option value="08">Agustus</option><option value="09">September</option>
                                    <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
                                </select>
                                <select id="filterTahun" class="form-select form-select-sm bg-dark text-light border-secondary" onchange="window.ambilDataTransaksi()">
                                    <option value="2025">2025</option><option value="2026">2026</option>
                                </select>
                                <button class="btn btn-outline-primary btn-sm dropdown-toggle" data-bs-toggle="dropdown">Export</button>
                                <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                                    <li><a class="dropdown-item" href="#" onclick="window.exportExcel(event)">Excel</a></li>
                                    <li><a class="dropdown-item" href="#" onclick="window.exportPDF(event)">PDF</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-dark table-hover m-0">
                            <thead>
                                <tr class="small">
                                    <th class="ps-3">Tgl</th>
                                    <th>Keterangan</th>
                                    <th>Nominal</th>
                                    <th class="text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tabelData" class="small"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Edit -->
    <div class="modal fade" id="modalEdit" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title fw-bold text-primary">Edit Transaksi</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formEdit">
                        <input type="hidden" id="editId">
                        <div class="mb-3">
                            <label class="small text-secondary">Tipe</label>
                            <select id="editTipe" class="form-select bg-dark text-light border-secondary">
                                <option value="masuk">Pemasukan (+)</option>
                                <option value="keluar">Pengeluaran (-)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="small text-secondary">Keterangan</label>
                            <input type="text" id="editKeterangan" class="form-control bg-dark text-light border-secondary" required>
                        </div>
                        <div class="mb-3">
                            <label class="small text-secondary">Nominal</label>
                            <input type="number" id="editNominal" class="form-control bg-dark text-light border-secondary" required>
                        </div>
                        <div class="mb-3">
                            <label class="small text-secondary">Tanggal Transaksi</label>
                            <input type="date" id="editTanggal" class="form-control bg-dark text-light border-secondary" required>
                        </div>
                        <button type="button" onclick="window.updateTransaksi()" class="btn btn-primary w-100 fw-bold">Update Data</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT URUTAN WAJIB -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <!-- Mencegah Cache dengan ?v=final -->
    <script src="assets/js/db.js?v=aman"></script>
</body>
</html>
