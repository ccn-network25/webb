<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Module | #am Command Center</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
       
    <style>
        body { display: none; } 
        .navbar-custom { background-color: #1a1d20 !important; }
        .card-summary { border-left: 4px solid #0d6efd; }
    </style>
</head>
<body class="bg-dark text-light">

    <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary mb-4 navbar-custom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="beranda.html">IVAN <span class="text-primary">#am</span></a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="beranda.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link active" href="keuangan.html">Keuangan</a></li>
                </ul>
                <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4 g-3">
            <div class="col-md-4">
                <div class="card bg-dark border-secondary card-summary h-100">
                    <div class="card-body">
                        <h6 class="text-secondary text-uppercase mb-2">Total Saldo</h6>
                        <h3 id="totalSaldo" class="fw-bold text-primary">Rp 0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-dark border-secondary h-100" style="border-left: 4px solid #198754;">
                    <div class="card-body">
                        <h6 class="text-secondary text-uppercase mb-2">Pemasukan</h6>
                        <h3 id="totalMasuk" class="fw-bold text-success">Rp 0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-dark border-secondary h-100" style="border-left: 4px solid #dc3545;">
                    <div class="card-body">
                        <h6 class="text-secondary text-uppercase mb-2">Pengeluaran</h6>
                        <h3 id="totalKeluar" class="fw-bold text-danger">Rp 0</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card bg-dark border-secondary rounded-4">
                    <div class="card-body p-4">
                        <h5 class="mb-3 fw-bold border-bottom border-secondary pb-2">Tambah Transaksi</h5>
                        <form id="formTransaksi">
                            <div class="mb-3">
                                <label class="form-label">Tipe</label>
                                <select id="tipe" class="form-select bg-dark text-light border-secondary">
                                    <option value="masuk">Pemasukan (+)</option>
                                    <option value="keluar">Pengeluaran (-)</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Keterangan</label>
                                <input type="text" id="keterangan" class="form-control bg-dark text-light border-secondary" required placeholder="Contoh: Project Website">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nominal (Rp)</label>
                                <input type="number" id="nominal" class="form-control bg-dark text-light border-secondary" required placeholder="100000">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold">Simpan Data</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card bg-dark border-secondary rounded-4 overflow-hidden">
                    <div class="card-header bg-dark border-secondary d-flex justify-content-between align-items-center p-3">
                        <h5 class="m-0 fw-bold">Riwayat Transaksi</h5>
                        <div class="dropdown">
                            <button class="btn btn-outline-secondary btn-sm dropdown-toggle" data-bs-toggle="dropdown">Export Data</button>
                            <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                                <li><a class="dropdown-item" href="#" onclick="exportExcel()">Export to Excel (.xlsx)</a></li>
                                <li><a class="dropdown-item" href="#" onclick="exportCSV()">Export to CSV (.csv)</a></li>
                                <li><a class="dropdown-item" href="#" onclick="exportPDF()">Export to PDF (.pdf)</a></li>
                            </ul>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-dark table-hover m-0">
                                <thead class="table-secondary">
                                    <tr>
                                        <th class="ps-3">Tanggal</th>
                                        <th>Keterangan</th>
                                        <th>Tipe</th>
                                        <th>Nominal</th>
                                        <th class="text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelData"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/db.js"></script>
</body>
     <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/auth.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
</html>
