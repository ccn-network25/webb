<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Keuangan | #am</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/auth.js"></script>
    <style>
    /* Sembunyikan seluruh isi halaman saat pertama dimuat */
    body { display: none; }
</style>
    <script>
        // Cek sesi user sebelum halaman ditampilkan
        checkSession();
    </script>
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">IVAN <span class="text-primary">#am</span></a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <button id="logoutBtn" class="btn btn-outline-danger btn-sm mt-1">Logout</button>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Dashboard Keuangan</h2>

        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card bg-dark border-secondary">
                    <div class="card-body">
                        <h5 class="mb-3 border-bottom border-secondary pb-2">Tambah Transaksi</h5>
                        <form id="formTransaksi">
                            <div class="mb-3">
                                <label class="form-label text-light">Tipe Transaksi</label>
                                <select id="tipe" class="form-select bg-dark text-light border-secondary" required>
                                    <option value="masuk">Pemasukan</option>
                                    <option value="keluar">Pengeluaran</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-light">Keterangan</label>
                                <input type="text" id="keterangan" class="form-control bg-dark text-light border-secondary" required placeholder="Contoh: Honor Audit, Makan...">
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-light">Nominal (Rp)</label>
                                <input type="number" id="nominal" class="form-control bg-dark text-light border-secondary" required placeholder="50000">
                            </div>
                            <button type="submit" class="btn btn-success w-100 fw-bold">Catat Transaksi</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card bg-dark border-secondary">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-dark table-hover table-striped m-0">
                                <thead>
                                    <tr>
                                        <th class="ps-3">Tanggal</th>
                                        <th>Keterangan</th>
                                        <th>Tipe</th>
                                        <th>Nominal</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelData">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/db.js"></script>
</body>
</html>
